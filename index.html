<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 差異比對工具</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for in-browser JSX transformation -->
    <!-- <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script> -->

    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.12/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 手動定義 Lucide 圖示組件以符合單檔案需求
        const ChevronDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6" /></svg>;
        const ChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6" /></svg>;
        const Trash2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></svg>;
        const GitCompare = ({ size = 20 }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="18" r="3" /><circle cx="6" cy="6" r="3" /><path d="M13 6h3a2 2 0 0 1 2 2v7" /><path d="M11 18H8a2 2 0 0 1-2-2V9" /></svg>;

        const App = () => {
            const [beforeInput, setBeforeInput] = useState('{\n  "name": "Gemini",\n  "version": 1,\n  "features": ["Chat", "Code"],\n  "status": "active"\n}');
            const [afterInput, setAfterInput] = useState('{\n  "name": "Gemini 2.0",\n  "version": 2,\n  "features": ["Chat", "Code", "Reasoning"],\n  "status": "active",\n  "newField": "Hello World"\n}');
            const [diffData, setDiffData] = useState(null);

            const compareJson = () => {
                try {
                    const before = JSON.parse(beforeInput);
                    const after = JSON.parse(afterInput);
                    setDiffData({ before, after });
                } catch (e) {
                    alert("JSON 格式錯誤，請檢查輸入內容。");
                }
            };

            const JsonNode = ({ data, otherData, side }) => {
                const [isExpanded, setIsExpanded] = useState(true);
                const isObject = (val) => val !== null && typeof val === 'object';

                const renderValue = (val, otherVal) => {
                    if (isObject(val)) {
                        return <div className="ml-4"><JsonNode data={val} otherData={otherVal} side={side} /></div>;
                    }
                    const hasChanged = JSON.stringify(val) !== JSON.stringify(otherVal);
                    let bgColor = hasChanged ? (side === 'left' ? "bg-red-100 text-red-700" : "bg-green-100 text-green-700") : "";
                    return <span className={`px-1 rounded ${bgColor}`}>{JSON.stringify(val)}</span>;
                };

                if (!isObject(data)) return JSON.stringify(data);
                const keys = Array.isArray(data) ? [...Array(data.length).keys()] : Object.keys(data);

                return (
                    <div className="font-mono text-sm">
                        <div className="flex items-center cursor-pointer hover:bg-gray-100 rounded px-1" onClick={() => setIsExpanded(!isExpanded)}>
                            {isExpanded ? <ChevronDown /> : <ChevronRight />}
                            <span className="text-blue-600 ml-1">{Array.isArray(data) ? "[" : "{"}</span>
                            {!isExpanded && <span className="text-gray-400 italic ml-1">... {keys.length} items</span>}
                            {!isExpanded && <span className="text-blue-600 ml-1">{Array.isArray(data) ? "]" : "}"}</span>}
                        </div>
                        {isExpanded && (
                            <div className="border-l border-gray-200 ml-2 pl-4">
                                {keys.map((key) => {
                                    const val = data[key];
                                    const otherVal = isObject(otherData) ? otherData[key] : undefined;
                                    return (
                                        <div key={key} className={`py-0.5 ${otherVal === undefined ? (side === 'left' ? "bg-red-50" : "bg-green-50") : ""}`}>
                                            <span className="text-purple-600">"{key}"</span>: {renderValue(val, otherVal)}
                                            {key !== keys[keys.length - 1] && ","}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                        {isExpanded && <div className="text-blue-600">{Array.isArray(data) ? "]" : "}"}</div>}
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <header className="mb-8 text-center">
                            <h1 className="text-3xl font-bold text-gray-800 flex items-center justify-center gap-2">
                                <GitCompare size={32} /> JSON 差異比對工具
                            </h1>
                        </header>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <textarea className="h-64 p-4 border rounded-lg font-mono text-sm" value={beforeInput} onChange={(e) => setBeforeInput(e.target.value)} />
                            <textarea className="h-64 p-4 border rounded-lg font-mono text-sm" value={afterInput} onChange={(e) => setAfterInput(e.target.value)} />
                        </div>
                        <div className="flex justify-center mb-10">
                            <button onClick={compareJson} className="px-8 py-3 bg-blue-600 text-white font-bold rounded-full shadow-lg">開始比對</button>
                        </div>
                        {diffData && (
                            <div className="grid grid-cols-1 md:grid-cols-2 border rounded-xl overflow-hidden bg-white shadow-xl">
                                <div className="p-6 border-r overflow-auto max-h-[600px]">
                                    <div className="font-bold text-red-600 border-b mb-4">BEFORE (刪除)</div>
                                    <JsonNode data={diffData.before} otherData={diffData.after} side="left" />
                                </div>
                                <div className="p-6 overflow-auto max-h-[600px]">
                                    <div className="font-bold text-green-600 border-b mb-4">AFTER (新增)</div>
                                    <JsonNode data={diffData.after} otherData={diffData.before} side="right" />
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
